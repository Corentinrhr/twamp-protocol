name: Build

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  ARTIFACT_RETENTION_DAYS: 30
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest

          - target: macos-arm64
            os: macos-14

          - target: android-arm64
            os: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential make gcc g++ pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install make || true

      - name: Patch Makefile for CI compatibility
        shell: bash
        run: |
          sed -i.bak 's/ twamp\.h//g'       Makefile || true
          sed -i.bak 's/-static//g'          Makefile || true
          sed -i.bak '/^CC[[:space:]]*=/d'   Makefile || true
          sed -i.bak 's/gcc/$(CC)/g'         Makefile || true
          echo "=== Patched Makefile ==="
          cat Makefile

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "android-arm64" ]; then
            export CC=$(ls $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android*-clang \
              | grep -v "++" | sort -V | tail -n 1)
            echo "Using compiler: $CC"
            make CC="$CC" -j"$(nproc)"
          else
            make -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.logicalcpu)"
          fi

      - name: Collect binaries
        shell: bash
        run: |
          mkdir -p dist/server dist/client
          find . -maxdepth 2 -type f -name "server" -exec cp {} dist/server/twamp_server_${{ matrix.target }} \;
          find . -maxdepth 2 -type f -name "client" -exec cp {} dist/client/twamp_client_${{ matrix.target }} \;
          echo "=== Collected binaries ==="
          ls -lh dist/server/ dist/client/
          test "$(find dist -type f | wc -l)" -eq 2

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.target }}
          path: dist/server/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.target }}
          path: dist/client/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      # FIX: Flatten all artifact subdirectories into a single dist/ folder
      # so softprops/action-gh-release uploads files with clean names
      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;
          echo "=== Files ready for release ==="
          ls -lh dist/

      # FIX: Push the tag explicitly before creating the release
      - name: Create and push release tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v1.0.${{ github.run_number }}"
          git push origin "v1.0.${{ github.run_number }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: dist/*          # Clean flat glob — no subdirectory noise
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
