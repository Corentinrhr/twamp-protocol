name: Build TWAMP (multi-platform)

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Linux x86-64 ──────────────────────────────────────────────────
          - target: linux-x64
            os: ubuntu-latest
            generator: Ninja
            cmake_extra: >-
              -DCMAKE_C_COMPILER=gcc
              -DCMAKE_CXX_COMPILER=g++

          # ── macOS arm64 (native Apple Silicon runner) ─────────────────────
          - target: macos-arm64
            os: macos-14
            generator: Ninja
            cmake_extra: >-
              -DCMAKE_OSX_ARCHITECTURES=arm64

          # ── Windows x86-64 ────────────────────────────────────────────────
          # Uses Visual Studio generator — incompatible with Ninja + -A x64
          - target: windows-x64
            os: windows-latest
            generator: "Visual Studio 17 2022"
            cmake_extra: >-
              -A x64

          # ── Android arm64-v8a (cross-compile via NDK) ─────────────────────
          - target: android-arm64
            os: ubuntu-latest
            generator: Ninja
            cmake_extra: >-
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake
              -DANDROID_ABI=arm64-v8a
              -DANDROID_PLATFORM=android-26
              -DANDROID_STL=c++_static

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Diagnose workspace structure ──────────────────────────────────────
      # Remove this step once the build is stable
      - name: Debug workspace
        shell: bash
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Root contents ==="
          ls -la
          echo "=== CMakeLists.txt locations ==="
          find . -name "CMakeLists.txt" -maxdepth 5 | sort

      # ── Linux dependencies (native build + Android NDK cross-compile host) ─
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config

      # ── macOS dependencies ────────────────────────────────────────────────
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      # ── Android – verify NDK available on the runner ─────────────────────
      - name: Verify Android NDK
        if: matrix.target == 'android-arm64'
        run: |
          echo "NDK path: $ANDROID_NDK_ROOT"
          ls "$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake"
          # To pin a specific NDK version, uncomment:
          # echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
          # echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            ${{ matrix.cmake_extra }}

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ── Unit tests (disabled for Android – no emulator in CI) ────────────
      - name: Run tests
        if: matrix.target != 'android-arm64'
        working-directory: build
        run: ctest --build-config ${{ env.BUILD_TYPE }} --output-on-failure

      # ── Collect server binary ─────────────────────────────────────────────
      - name: Collect server binary
        shell: bash
        run: |
          mkdir -p dist/server
          if [ "${{ runner.os }}" = "Windows" ]; then
            find build -maxdepth 4 -name "twamp_server.exe" -exec cp {} dist/server/ \;
          else
            find build -maxdepth 4 -name "twamp_server" -not -name "*.cmake" -exec cp {} dist/server/ \;
          fi
          ls -lh dist/server/

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.target }}
          path: dist/server/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      # ── Collect client binary ─────────────────────────────────────────────
      - name: Collect client binary
        shell: bash
        run: |
          mkdir -p dist/client
          if [ "${{ runner.os }}" = "Windows" ]; then
            find build -maxdepth 4 -name "twamp_client.exe" -exec cp {} dist/client/ \;
          else
            find build -maxdepth 4 -name "twamp_client" -not -name "*.cmake" -exec cp {} dist/client/ \;
          fi
          ls -lh dist/client/

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.target }}
          path: dist/client/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

  # ── Automatic release on tag push vX.Y.Z ─────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
