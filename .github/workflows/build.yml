name: Build TWAMP

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest

          - target: macos-arm64
            os: macos-14

          - target: android-arm64
            os: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential make gcc g++ pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install make || true

      - name: Patch Makefile for CI compatibility
        shell: bash
        run: |
          # 1. Remove header files from compile line (fixes macOS clang error)
          sed -i.bak 's/ twamp\.h//g' Makefile || true
          
          # 2. Remove hardcoded -static flag (macOS lacks support, causes cross-compilation issues)
          sed -i.bak 's/-static//g' Makefile || true
          
          # 3. Delete any existing CC assignment (like CC=gcc) to prevent Make recursive loop
          sed -i.bak '/^CC[[:space:]]*=/d' Makefile || true
          
          # 4. Replace hardcoded gcc binary calls with $(CC)
          sed -i.bak 's/gcc/$(CC)/g' Makefile || true
          
          echo "=== Patched Makefile ==="
          cat Makefile

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "android-arm64" ]; then
            echo "Configuring Android NDK Toolchain..."
            # Find the aarch64 clang compiler in the installed NDK
            export CC=$(ls $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android*-clang | grep -v "++" | sort -V | tail -n 1)
            echo "Using compiler: $CC"
            make CC="$CC" -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc)"
          else
            make -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.logicalcpu)"
          fi

      - name: Collect server binary
        shell: bash
        run: |
          mkdir -p dist/server
          # Target exactly 'server' and move it to the expected artifact name
          find . -maxdepth 2 -type f -name "server" -exec cp {} dist/server/twamp_server \;
          ls -lh dist/server/
          test "$(find dist/server -type f | wc -l)" -gt 0

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.target }}
          path: dist/server/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Collect client binary
        shell: bash
        run: |
          mkdir -p dist/client
          # Target exactly 'client' and move it to the expected artifact name
          find . -maxdepth 2 -type f -name "client" -exec cp {} dist/client/twamp_client \;
          ls -lh dist/client/
          test "$(find dist/client -type f | wc -l)" -gt 0

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.target }}
          path: dist/client/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
