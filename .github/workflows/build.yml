name: Build TWAMP

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest

          - target: macos-arm64
            os: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Debug workspace
        shell: bash
        run: |
          echo "Working directory: $(pwd)"
          echo "Repository root:"
          ls -la
          echo
          echo "Top-level files:"
          find . -maxdepth 2 -type f | sort

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential make gcc g++ pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install make || true

      - name: Verify Makefile exists
        shell: bash
        run: |
          test -f Makefile || { echo "Makefile not found at repository root"; exit 1; }

      - name: Build
        shell: bash
        run: |
          make -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.logicalcpu)"

      - name: Collect server binary
        shell: bash
        run: |
          mkdir -p dist/server
          find . -type f -name "twamp_server" -exec cp {} dist/server/ \;
          ls -lh dist/server/
          test "$(find dist/server -type f | wc -l)" -gt 0

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server_${{ matrix.target }}
          path: dist/server/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Collect client binary
        shell: bash
        run: |
          mkdir -p dist/client
          find . -type f -name "twamp_client" -exec cp {} dist/client/ \;
          ls -lh dist/client/
          test "$(find dist/client -type f | wc -l)" -gt 0

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.target }}
          path: dist/client/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
